name: Continuous integration

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  code_check:
    name: Code check
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
          cache: 'pip'

      - name: Install formatter
        run: pip install pre_commit

      - name: Check format
        run: python -m pre_commit run --all-files

  unit_tests:
    name: Unit tests - QGIS:${{ matrix.qgis-tag }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        qgis-tag: ["3.38", "3.40", "latest"]

    container:
      image: qgis/qgis:${{ matrix.qgis-tag }}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Install Node.js
        run: apt-get update && apt-get install -y nodejs

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv --system-site-packages
          uv sync --group dev

      - name: Run tests
        run: uv run pytest
